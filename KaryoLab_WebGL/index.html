<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>KaryoLab</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C4A35A;
      --bg:   #080710;
      --text: #E8D9B8;
      --dim:  rgba(232,217,184,.35);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      transition: opacity 1.4s cubic-bezier(.4,0,.2,1),
                  transform 1.4s cubic-bezier(.4,0,.2,1);
    }
    #splash.out {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    /* ambient glow */
    #splash::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      background: radial-gradient(ellipse, rgba(80,40,160,.18) 0%, transparent 68%);
      pointer-events: none;
    }

    .inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
    }

    /* logo */
    .logo {
      width: 120px;
      opacity: 0;
      transform: translateY(10px);
      animation: up .9s cubic-bezier(.16,1,.3,1) .1s forwards;
    }
    .logo img { width: 100%; height: auto; display: block; }

    /* hairline rule under logo */
    .line-v {
      width: 1px; height: 44px;
      background: linear-gradient(to bottom, rgba(196,163,90,.4), transparent);
      margin: 28px 0;
      opacity: 0;
      animation: up .8s cubic-bezier(.16,1,.3,1) .4s forwards;
    }

    /* title */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 38px;
      letter-spacing: .12em;
      color: var(--text);
      opacity: 0;
      animation: up .8s cubic-bezier(.16,1,.3,1) .55s forwards;
    }
    h1 em { color: var(--gold); font-style: normal; }

    .sub {
      margin-top: 6px;
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: 9.5px;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: var(--dim);
      opacity: 0;
      animation: up .8s cubic-bezier(.16,1,.3,1) .65s forwards;
    }

    /* progress */
    .bar-wrap {
      margin-top: 52px;
      width: 200px;
      opacity: 0;
      animation: up .8s cubic-bezier(.16,1,.3,1) .8s forwards;
    }
    .bar-track {
      height: 1px;
      background: rgba(196,163,90,.12);
      position: relative;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--gold);
      transition: width .3s ease;
      position: relative;
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      right: -1px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px 2px rgba(196,163,90,.6);
    }

    /* status */
    .status {
      margin-top: 30px;
      text-align: center;
      opacity: 0;
      animation: up .8s cubic-bezier(.16,1,.3,1) .9s forwards;
    }
    .status p:first-child {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 15px;
      letter-spacing: .06em;
      color: var(--text);
    }
    .status p:last-child {
      margin-top: 5px;
      font-family: 'Inter', sans-serif;
      font-weight: 200; font-size: 9px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* cursor blink */
    .cur {
      display: inline-block;
      width: 1px; height: 11px;
      background: var(--gold);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0; }
    }

    /* ── UNITY FULLSCREEN ── */
    #unity-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1.4s cubic-bezier(.4,0,.2,1) .2s;
    }
    #unity-container.show { opacity: 1; }
    
    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Hide all Unity branding and loading elements */
    #unity-loading-bar, 
    #unity-logo,
    #unity-footer,
    #unity-logo-title-footer,
    #unity-build-title { 
      display: none !important; 
    }
  </style>
</head>
<body>

<div id="splash">
  <div class="inner">
    <div class="logo">
      <img src="TemplateData/kaznmu_logo.png" alt="КазНМУ">
    </div>

    <div class="line-v"></div>

    <h1>Karyo<em>Lab</em></h1>
    <p class="sub">КазНМУ им. Асфендиярова</p>

    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="bar"></div>
      </div>
    </div>

    <div class="status">
      <p>Загружаю лабораторию<span class="cur"></span></p>
      <p>Подожди, юный лаборант</p>
    </div>
  </div>
</div>

<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <div id="unity-warning"> </div>
  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">KaryoLab</div>
  </div>
</div>

<script>
  var canvas   = document.querySelector("#unity-canvas");
  var bar      = document.getElementById('bar');
  var splash   = document.getElementById('splash');
  var container = document.getElementById('unity-container');

  function setProgress(p) {
    bar.style.width = (p * 100) + '%';
    var progressBar = document.querySelector("#unity-progress-bar-full");
    if (progressBar) {
      progressBar.style.width = (p * 100) + "%";
    }
  }

  function reveal() {
    container.classList.add('show');
    splash.classList.add('out');
    setTimeout(function() { splash.style.display = 'none'; }, 1600);
  }

  function unityShowBanner(msg, type) {
    // Отключаем показ Unity баннеров
    console.log('Unity message:', msg, type);
  }

  var buildUrl  = "Build";
  var loaderUrl = buildUrl + "/KaryoLab_WebGL.loader.js";
  var config = {
    arguments:           [],
    dataUrl:             buildUrl + "/KaryoLab_WebGL.data",
    frameworkUrl:        buildUrl + "/KaryoLab_WebGL.framework.js",
    codeUrl:             buildUrl + "/KaryoLab_WebGL.wasm",
    streamingAssetsUrl:  "StreamingAssets",
    companyName:         "DefaultCompany",
    productName:         "KaryoLab",
    productVersion:      "0.1.0",
    showBanner:          unityShowBanner,
  };

  // Mobile detection
  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name    = 'viewport';
    meta.content = 'width=device-width,height=device-height,initial-scale=1.0,user-scalable=no,shrink-to-fit=yes';
    document.head.appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  }

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, setProgress)
      .then(ui => {
        setProgress(1);
        setTimeout(reveal, 600);
      })
      .catch(function(error) {
        console.error('Unity load error:', error);
        alert('Ошибка загрузки игры: ' + error);
      });
  };
  document.body.appendChild(script);
</script>
</body>
</html>
